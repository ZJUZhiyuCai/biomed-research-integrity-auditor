name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate contracts and tests
        run: make validate

      - name: Run key audit regressions
        run: |
          python scripts/audit_package.py evals/cases/case_001 --output-dir audit_outputs/case_001 --case-id case_001
          python scripts/audit_package.py evals/cases/case_012 --output-dir audit_outputs/case_012 --case-id case_012
          python scripts/audit_package.py evals/cases/case_004 --output-dir audit_outputs/case_004 --case-id case_004
          python scripts/audit_package.py evals/cases/case_005 --output-dir audit_outputs/case_005 --case-id case_005
          python scripts/audit_package.py evals/cases/case_008 --output-dir audit_outputs/case_008 --case-id case_008
          python scripts/audit_package.py evals/cases/case_010 --output-dir audit_outputs/case_010 --case-id case_010
          python scripts/audit_package.py evals/cases/case_020 --output-dir audit_outputs/case_020 --case-id case_020
          python scripts/audit_package.py evals/cases/case_021 --output-dir audit_outputs/case_021 --case-id case_021
          python scripts/audit_package.py evals/cases/case_022 --output-dir audit_outputs/case_022 --case-id case_022
          python scripts/audit_package.py evals/cases/case_023 --output-dir audit_outputs/case_023 --case-id case_023
          python scripts/audit_package.py evals/cases/case_024 --output-dir audit_outputs/case_024 --case-id case_024
          python scripts/audit_package.py evals/cases/case_025 --output-dir audit_outputs/case_025 --case-id case_025
          python scripts/audit_package.py evals/cases/case_026 --output-dir audit_outputs/case_026 --case-id case_026
          python scripts/audit_package.py evals/cases/case_027 --output-dir audit_outputs/case_027 --case-id case_027
          python scripts/audit_package.py evals/cases/case_028 --output-dir audit_outputs/case_028 --case-id case_028
          python scripts/audit_package.py evals/cases/case_029 --output-dir audit_outputs/case_029 --case-id case_029
          python scripts/audit_package.py evals/cases/case_030 --output-dir audit_outputs/case_030 --case-id case_030
          python evals/assert_audit_outputs.py --outputs-root audit_outputs \
            --case case_001 --case case_012 --case case_004 --case case_005 \
            --case case_008 --case case_010 --case case_020 --case case_021 \
            --case case_022 --case case_023 --case case_024 --case case_025 \
            --case case_026 --case case_027 --case case_028 --case case_029 \
            --case case_030

      - name: Upload audit outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-outputs-${{ matrix.python-version }}
          path: audit_outputs/

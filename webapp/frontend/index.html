<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="theme-color"
      content="#f4f1ea"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0d1410"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="description"
      content="Local-first biomedical research integrity self-audit. Bound to 127.0.0.1; no upload by default."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%20fill='none'%20stroke='%230f766e'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M12%2022s8-4%208-10V5l-8-3-8%203v7c0%206%208%2010%208%2010z'/%3E%3Cpath%20d='m9%2012%202%202%204-4'/%3E%3C/svg%3E"
    />
    <title>生物医药研究诚信自查</title>
    <script>
      // Set theme before first paint to avoid FOUC.
      (function () {
        try {
          var saved = localStorage.getItem("biomed-self-audit-theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
